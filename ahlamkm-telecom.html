<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>أحلامكم للاتصالات | Ahlamkm Telecom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --bezel:#0a0a0c;
    --ink:#1d1d1f;
    --muted:#8a8a90;
    --line:#eee;
    --bg:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Tajawal',-apple-system,BlinkMacSystemFont,sans-serif;
    background:
      radial-gradient(1000px 600px at 15% -10%, #eef1f7 0%, transparent 55%),
      radial-gradient(900px 600px at 110% 110%, #f1eef7 0%, transparent 55%),
      linear-gradient(160deg,#e8eaf0 0%,#dee0e8 100%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;overflow-x:hidden;
  }

  /* ===== Device frame ===== */
  .phone{
    position:relative;
    width:390px;max-width:100%;
    height:844px;max-height:calc(100vh - 40px);
    background:linear-gradient(135deg,#1a1a1d,#070708);
    border-radius:56px;
    padding:13px;
    box-shadow:
      0 0 0 2px rgba(255,255,255,.06),
      0 2px 6px rgba(0,0,0,.25),
      0 40px 80px -20px rgba(40,40,80,.55);
  }
  .side-btn{position:absolute;background:#0a0a0b;border-radius:4px;box-shadow:inset 0 1px 1px rgba(255,255,255,.08);}
  .side-btn.power{right:-3px;top:200px;width:3px;height:82px;}
  .side-btn.vol-up{left:-3px;top:168px;width:3px;height:56px;}
  .side-btn.vol-dn{left:-3px;top:236px;width:3px;height:56px;}
  .side-btn.silent{left:-3px;top:116px;width:3px;height:34px;}

  .screen{
    position:relative;width:100%;height:100%;
    background:var(--bg);border-radius:44px;overflow:hidden;
    display:flex;flex-direction:column;
  }

  /* ===== Status bar ===== */
  .statusbar{
    position:relative;height:56px;flex:0 0 56px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 32px;z-index:30;color:var(--ink);font-weight:800;
  }
  .clock{font-size:15px;letter-spacing:.4px;min-width:54px;}
  .status-right{display:flex;align-items:center;gap:7px;}
  .signal{display:flex;align-items:flex-end;gap:2px;height:11px;}
  .signal span{width:3px;background:var(--ink);border-radius:1px;}
  .signal span:nth-child(1){height:4px;}
  .signal span:nth-child(2){height:6px;}
  .signal span:nth-child(3){height:8px;}
  .signal span:nth-child(4){height:11px;}
  .wifi{width:16px;height:12px;}
  .battery{display:flex;align-items:center;gap:4px;}
  .batt-shell{width:25px;height:12px;border:1.5px solid var(--ink);border-radius:3px;position:relative;padding:1.5px;opacity:.85;}
  .batt-shell::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:var(--ink);border-radius:0 1px 1px 0;opacity:.85;}
  .batt-fill{height:100%;background:#34c759;border-radius:1px;transition:width .6s ease,background .4s;}
  .batt-pct{font-size:12px;font-weight:800;}

  /* ===== Dynamic Island (FIXED height, text flows inside) ===== */
  .island{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    height:36px;width:124px;
    background:#000;border-radius:20px;z-index:40;
    overflow:hidden;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.4), inset 0 0 0 1px rgba(255,255,255,.04);
    transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .island:active{transform:translateX(-50%) scale(.96);}
  .island .cam{
    position:absolute;right:16px;top:50%;transform:translateY(-50%);
    width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#2a3a6a,#060608 70%);
    box-shadow:inset 0 0 2px rgba(120,150,255,.8);z-index:3;
  }
  .marquee-wrap{
    position:absolute;inset:0;display:flex;align-items:center;
    padding:0 14px;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 14%,#000 80%,transparent);
            mask-image:linear-gradient(90deg,transparent,#000 14%,#000 80%,transparent);
  }
  .marquee-track{white-space:nowrap;display:inline-block;color:#fff;font-size:12px;font-weight:700;will-change:transform;}
  .marquee-track b{color:#ffd34d;font-weight:900;}

  /* ===== Scroll area ===== */
  .content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;}
  .content::-webkit-scrollbar{width:0;}
  .page{padding:6px 18px 34px;}

  /* Branding */
  .brand{display:flex;flex-direction:column;align-items:center;gap:6px;margin:8px 0 4px;}
  .brand .logo-ring{
    width:118px;height:118px;border-radius:34px;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 30% 25%,#fff,#f3f4f8);
    box-shadow:0 12px 30px -12px rgba(60,60,120,.4), inset 0 0 0 1px rgba(0,0,0,.04);
    position:relative;overflow:hidden;
  }
  .brand .logo-ring::before{content:"";position:absolute;inset:-40%;background:conic-gradient(from 0deg,transparent,rgba(120,130,255,.18),transparent 30%);animation:spin 6s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .brand img{max-width:96px;height:auto;display:block;position:relative;z-index:2;}
  .brand .tag{font-size:12px;color:var(--muted);font-weight:600;}

  /* Search */
  .searchbar{margin:14px 2px 16px;display:flex;align-items:center;gap:9px;background:#f4f4f6;border-radius:16px;padding:12px 15px;
    transition:box-shadow .25s,background .25s;cursor:pointer;}
  .searchbar:active{background:#ececf0;}
  .searchbar input{border:none;background:transparent;outline:none;flex:1;font-family:inherit;font-size:14px;color:var(--ink);cursor:pointer;}
  .searchbar input::placeholder{color:var(--muted);}
  .searchbar .si{font-size:16px;}

  /* Hero banner */
  .hero{position:relative;border-radius:26px;overflow:hidden;margin:0 2px 22px;padding:22px 20px;
    background:linear-gradient(125deg,#5b2bd6 0%,#8b3fe8 45%,#c2389b 100%);color:#fff;min-height:128px;
    box-shadow:0 18px 36px -16px rgba(120,40,200,.6);}
  .hero h2{font-size:21px;font-weight:900;line-height:1.3;margin-bottom:6px;position:relative;z-index:2;}
  .hero p{font-size:12.5px;opacity:.9;position:relative;z-index:2;font-weight:600;}
  .hero .cta{margin-top:12px;display:inline-block;background:#fff;color:#6b2bd6;font-weight:900;font-size:12px;
    padding:8px 16px;border-radius:30px;position:relative;z-index:2;}
  .hero .orb{position:absolute;border-radius:50%;filter:blur(2px);}
  .hero .o1{width:120px;height:120px;background:rgba(255,255,255,.22);top:-40px;inset-inline-start:-30px;}
  .hero .o2{width:80px;height:80px;background:rgba(255,255,255,.14);bottom:-30px;inset-inline-end:40px;}
  .hero .emoji{position:absolute;font-size:80px;inset-inline-end:-6px;bottom:-14px;opacity:.9;z-index:1;filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));}

  /* Section title */
  .home-title{display:flex;align-items:center;justify-content:space-between;margin:4px 4px 16px;}
  .home-title h1{font-size:23px;font-weight:900;color:var(--ink);}
  .home-title h1 i{font-style:normal;background:linear-gradient(90deg,#7b2bd6,#c2389b);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .home-title .dots{display:flex;gap:5px;}
  .home-title .dots span{width:6px;height:6px;border-radius:50%;background:#ddd;}
  .home-title .dots span:first-child{background:#7b2bd6;width:18px;border-radius:4px;}

  /* ===== Categories grid (neat, equal, aligned) ===== */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
  .cat{
    position:relative;border-radius:24px;
    aspect-ratio:1/1.06;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;
    cursor:pointer;overflow:hidden;color:#fff;
    box-shadow:0 10px 22px -12px rgba(0,0,0,.4);
    will-change:transform;
  }
  .cat .ico{
    width:50px;height:50px;border-radius:17px;
    background:rgba(255,255,255,.22);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;font-size:26px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);
  }
  .cat .label{font-size:12px;font-weight:800;text-align:center;line-height:1.3;padding:0 4px;text-shadow:0 1px 3px rgba(0,0,0,.22);}
  .cat .badge{position:absolute;top:9px;inset-inline-start:9px;background:rgba(0,0,0,.32);color:#fff;font-size:9px;font-weight:900;padding:3px 8px;border-radius:20px;backdrop-filter:blur(4px);}
  .cat .shine{position:absolute;inset:0;background:linear-gradient(125deg,rgba(255,255,255,.4),transparent 42%);pointer-events:none;}
  .cat .glow{position:absolute;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.25);filter:blur(20px);bottom:-30px;inset-inline-end:-20px;pointer-events:none;}

  /* ===== Product page ===== */
  #productView{position:absolute;inset:0;background:#fff;display:none;flex-direction:column;z-index:10;}
  .pheader{position:relative;z-index:20;display:flex;align-items:center;gap:11px;padding:14px 18px 12px;
    background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);}
  .back{width:38px;height:38px;border-radius:50%;background:#f2f2f4;display:flex;align-items:center;justify-content:center;
    font-size:22px;color:var(--ink);cursor:pointer;flex:0 0 auto;transition:transform .2s,background .2s;font-weight:700;}
  .back:active{background:#e4e4e8;transform:scale(.9);}
  .pheader .ptitle{font-size:19px;font-weight:900;color:var(--ink);}
  .pheader .pcount{font-size:11px;color:var(--muted);font-weight:700;margin-inline-start:auto;background:#f4f4f6;padding:5px 11px;border-radius:20px;}

  .pv-content{flex:1;overflow-y:auto;overflow-x:hidden;}
  .pv-content::-webkit-scrollbar{width:0;}
  .products{padding:16px 16px 40px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 8px 20px -14px rgba(0,0,0,.3);will-change:transform,opacity;}
  .card .imgbox{position:relative;aspect-ratio:1/1;background:linear-gradient(160deg,#f7f7f9,#eef0f4);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .card .imgbox img.prod{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
  .card:active .imgbox img.prod{transform:scale(1.06);}
  .card .brandlogo{position:absolute;top:8px;inset-inline-start:8px;width:32px;height:32px;border-radius:10px;background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.14);display:flex;align-items:center;justify-content:center;padding:5px;}
  .card .brandlogo img{width:100%;height:100%;object-fit:contain;}
  .card .disc{position:absolute;top:8px;inset-inline-end:8px;background:linear-gradient(135deg,#ff3b30,#ff6a4d);color:#fff;font-size:10px;font-weight:900;padding:3px 8px;border-radius:20px;box-shadow:0 2px 8px rgba(255,59,48,.4);}
  .card .body{padding:11px 12px 13px;display:flex;flex-direction:column;gap:4px;flex:1;}
  .card .name{font-size:13.5px;font-weight:800;color:var(--ink);line-height:1.3;}
  .card .spec{font-size:11px;color:var(--muted);font-weight:600;line-height:1.45;min-height:31px;}
  .card .pricerow{display:flex;align-items:baseline;gap:8px;margin-top:auto;}
  .card .price{font-size:15px;font-weight:900;color:#0a7d2c;}
  .card .old{font-size:11px;color:var(--muted);text-decoration:line-through;}
  .card .buy{margin-top:9px;background:var(--ink);color:#fff;border:none;border-radius:14px;padding:10px;font-family:inherit;
    font-size:12.5px;font-weight:800;cursor:pointer;transition:transform .15s,opacity .2s;}
  .card .buy:active{transform:scale(.94);opacity:.9;}

  .empty{padding:70px 20px;text-align:center;color:var(--muted);font-weight:600;}
  .empty .e{font-size:50px;margin-bottom:12px;}

  /* home indicator */
  .home-bar{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:132px;height:5px;border-radius:3px;background:#1d1d1f;opacity:.85;z-index:35;}

  /* toast */
  .toast{position:absolute;bottom:34px;left:50%;transform:translateX(-50%) translateY(20px) scale(.9);
    background:rgba(18,18,20,.96);color:#fff;padding:13px 22px;border-radius:20px;font-size:13px;font-weight:800;z-index:60;
    opacity:0;pointer-events:none;transition:.4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 14px 34px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}

  /* cart fly dot */
  .fly{position:absolute;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#7b2bd6,#c2389b);z-index:55;pointer-events:none;box-shadow:0 4px 12px rgba(120,40,200,.5);}

  @media (max-width:420px){
    body{padding:0;background:#000;}
    .phone{width:100%;height:100vh;height:100dvh;max-height:none;border-radius:0;padding:0;box-shadow:none;}
    .side-btn{display:none;}
    .screen{border-radius:0;}
    .island{top:11px;}
  }
</style>
</head>
<body>
<div class="phone">
  <span class="side-btn silent"></span>
  <span class="side-btn vol-up"></span>
  <span class="side-btn vol-dn"></span>
  <span class="side-btn power"></span>

  <div class="screen">
    <!-- Dynamic Island: fixed size, text scrolls INSIDE -->
    <div class="island" id="island" title="عروض">
      <span class="cam"></span>
      <div class="marquee-wrap">
        <span class="marquee-track" id="marquee">🔥 عروض حصرية لفترة محدودة • خصومات تصل إلى <b>50%</b> على أحدث الجوالات • شحن مجاني • تقسيط بدون فوائد &nbsp;&nbsp;</span>
      </div>
    </div>

    <!-- Status bar -->
    <div class="statusbar">
      <div class="clock" id="clock">9:41</div>
      <div class="status-right">
        <div class="signal"><span></span><span></span><span></span><span></span></div>
        <svg class="wifi" viewBox="0 0 16 12" fill="none"><path d="M8 10.5l1.3-1.3a1.8 1.8 0 00-2.6 0L8 10.5z" fill="#1d1d1f"/><path d="M4.8 7.3a4.5 4.5 0 016.4 0" stroke="#1d1d1f" stroke-width="1.4" stroke-linecap="round"/><path d="M2.6 5.1a7.6 7.6 0 0110.8 0" stroke="#1d1d1f" stroke-width="1.4" stroke-linecap="round"/></svg>
        <div class="battery">
          <span class="batt-pct" id="battPct">84%</span>
          <div class="batt-shell"><div class="batt-fill" id="battFill" style="width:84%"></div></div>
        </div>
      </div>
    </div>

    <!-- HOME -->
    <div class="content" id="homeView">
      <div class="page">
        <div class="brand">
          <div class="logo-ring">
            <a href="https://ibb.co/6cvbMsNT"><img src="https://i.ibb.co/6cvbMsNT/IMG-379.jpg" alt="IMG-379" border="0" style="max-width: 150px; height: auto;" /></a>

          <span class="tag">متجر الجوالات والإلكترونيات الأول</span>
        </div>

        <div class="searchbar" id="homeSearch">
          <span class="si">🔍</span>
          <input type="text" placeholder="ابحث عن منتج أو ماركة..." readonly />
        </div>

        <div class="hero" id="hero">
          <span class="orb o1"></span><span class="orb o2"></span>
          <h2>أحدث الجوالات<br>بين يديك الآن</h2>
          <p>اكتشف عروض الموسم على آيفون وسامسونج</p>
          <span class="cta">تسوّق العروض ←</span>
          <span class="emoji">📱</span>
        </div>

        <div class="home-title">
          <h1>تصفّح <i>الأقسام</i></h1>
          <div class="dots"><span></span><span></span><span></span></div>
        </div>

        <div class="grid" id="catGrid"></div>
      </div>
    </div>

    <!-- PRODUCT VIEW -->
    <div id="productView">
      <div class="pheader">
        <div class="back" id="backBtn">‹</div>
        <div class="ptitle" id="catTitle">القسم</div>
        <div class="pcount" id="catCount"></div>
      </div>
      <div class="pv-content">
        <div class="products" id="productGrid"></div>
      </div>
    </div>

    <div class="toast" id="toast"><span>🛒</span><span>تمت الإضافة إلى السلة</span></div>
    <div class="home-bar"></div>
  </div>
</div>

/* ======================= RENDER HOME ======================= */
const catGrid = document.getElementById('catGrid');
CATEGORIES.forEach((c)=>{
  const el=document.createElement('div');
  el.className='cat';
  el.style.background=c.grad;
  el.innerHTML=`<div class="shine"></div><div class="glow"></div>${c.badge?`<span class="badge">${c.badge}</span>`:''}
    <div class="ico">${c.icon}</div><div class="label">${c.name}</div>`;
  el.addEventListener('click',()=>{
    gsap.to(el,{scale:.9,duration:.12,yoyo:true,repeat:1,onComplete:()=>openCategory(c)});
  });
  el.addEventListener('mouseenter',()=>{
    gsap.to(el,{scale:1.06,y:-5,duration:.3,ease:"power3.out",boxShadow:"0 20px 34px -10px rgba(0,0,0,.4)"});
    gsap.to(el.querySelector('.ico'),{rotate:-8,scale:1.1,duration:.3,ease:"back.out(2)"});
  });
  el.addEventListener('mouseleave',()=>{
    gsap.to(el,{scale:1,y:0,duration:.3,ease:"power3.out",boxShadow:"0 10px 22px -12px rgba(0,0,0,.4)"});
    gsap.to(el.querySelector('.ico'),{rotate:0,scale:1,duration:.3,ease:"power2.out"});
  });
  catGrid.appendChild(el);
});

/* entrance choreography */
gsap.from('.logo-ring',{scale:.5,opacity:0,duration:.8,ease:"back.out(1.7)"});

/* ======================= PRODUCT VIEW ======================= */
const homeView=document.getElementById('homeView');
const productView=document.getElementById('productView');
const productGrid=document.getElementById('productGrid');
const catTitle=document.getElementById('catTitle');
const catCount=document.getElementById('catCount');

function openCategory(c){
  const items = P[c.id] || [];
  catTitle.textContent=c.name;
  catCount.textContent= items.length ? `${items.length} منتج` : 'قريباً';
  productGrid.innerHTML='';
  if(!items.length){
    productGrid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="e">🛍️</div>سيتم إضافة منتجات هذا القسم قريباً</div>`;
  }else{
    items.forEach(p=>{
      const logo=LOGOS[p.brand]||'';
      const card=document.createElement('div');
      card.className='card';
      card.innerHTML=`
        <div class="imgbox">
          ${logo?`<div class="brandlogo"><img src="${logo}" alt="${p.brand}"></div>`:''}
          ${p.disc?`<span class="disc">-${p.disc}%</span>`:''}
          <img class="prod" src="${p.img}" alt="${p.name}" loading="lazy"
               onerror="this.src='https://placehold.co/600x600/eef0f4/8a8a90?text='+encodeURIComponent('${p.name}')">
        </div>
        <div class="body">
          <div class="name">${p.name}</div>
          <div class="spec">${p.spec}</div>
          <div class="pricerow">
            <span class="price">${p.price.toLocaleString('ar-EG')} ر.س</span>
            ${p.old?`<span class="old">${p.old.toLocaleString('ar-EG')}</span>`:''}
          </div>
          <button class="buy">أضف للسلة 🛒</button>
        </div>`;
      card.querySelector('.buy').addEventListener('click',(e)=>flyToCart(e,card));
      productGrid.appendChild(card);
    });
  }

  productView.style.display='flex';
  gsap.fromTo(productView,{xPercent:100},{xPercent:0,duration:.45,ease:"power3.out"});
  gsap.to(homeView,{xPercent:-22,opacity:.35,duration:.45,ease:"power3.out"});
  if(items.length){
    gsap.from('.card',{y:34,opacity:0,scale:.94,duration:.45,stagger:.07,ease:"power2.out",delay:.14});
  }
}

document.getElementById('backBtn').addEventListener('click',closeCategory);
function closeCategory(){
  gsap.to(productView,{xPercent:100,duration:.4,ease:"power3.in",onComplete:()=>{productView.style.display='none';}});
  gsap.to(homeView,{xPercent:0,opacity:1,duration:.45,ease:"power3.out"});
}

document.getElementById('homeSearch').addEventListener('click',()=>openCategory(CATEGORIES.find(c=>c.id==='phones')));

/* ======================= FLY TO CART + TOAST ======================= */
const toast=document.getElementById('toast');let tT;
function showToast(){clearTimeout(tT);toast.classList.add('show');tT=setTimeout(()=>toast.classList.remove('show'),1700);}

function flyToCart(e,card){
  const screen=document.querySelector('.screen');
  const sRect=screen.getBoundingClientRect();
  const img=card.querySelector('.prod');
  const r=img.getBoundingClientRect();
  const dot=document.createElement('div');
  dot.className='fly';
  dot.style.left=(r.left - sRect.left + r.width/2 - 8)+'px';
  dot.style.top=(r.top - sRect.top + r.height/2 - 8)+'px';
  screen.appendChild(dot);
  gsap.to(dot,{
    left:'50%', top:34, scale:.4, opacity:.6,
    duration:.7, ease:"power2.in",
    onComplete:()=>{dot.remove();showToast();
      gsap.fromTo('#island',{scale:1},{scale:1.12,duration:.18,yoyo:true,repeat:1,ease:"power2.out",transformOrigin:"center"});
    }
  });
}

/* ======================= CLOCK + BATTERY ======================= */
function tick(){
  const d=new Date();let h=d.getHours(),m=d.getMinutes();
  document.getElementById('clock').textContent=`${h}:${m.toString().padStart(2,'0')}`;
}
tick();setInterval(tick,15000);

let pct=84;const battFill=document.getElementById('battFill'),battPct=document.getElementById('battPct');
setInterval(()=>{
  pct+=(Math.random()>.5?1:-1);
  if(pct>100)pct=92;if(pct<22)pct=42;
  battFill.style.width=pct+'%';battPct.textContent=pct+'%';
  battFill.style.background = pct<=20?'#ff3b30':(pct<=40?'#ffcc00':'#34c759');
},4500);

/* ======================= ISLAND MARQUEE (fixed island, text flows) ======================= */
const island=document.getElementById('island');
const marquee=document.getElementById('marquee');
const islandW=124, pad=28;
function runMarquee(){
  const textW=marquee.offsetWidth;
  gsap.set(marquee,{x:islandW - pad});
  gsap.to(marquee,{x:-(textW),duration:Math.max(11,textW/32),ease:"none",repeat:-1});
}
window.addEventListener('load',()=>{
  setTimeout(runMarquee,400);
  // playful tap: tiny bounce only, NEVER resize
  island.addEventListener('click',()=>{
    gsap.fromTo(island,{scale:1},{scale:.94,duration:.14,yoyo:true,repeat:1,ease:"power2.out",transformOrigin:"center"});
  });
});
</script>
